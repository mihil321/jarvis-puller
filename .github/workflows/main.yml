name: Docker Puller
on: [workflow_dispatch]
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Evolution API
        run: |
          # Скачиваем официальный и открытый образ Evolution API
          docker pull evolutionapi/evolution-api:latest
          # Сохраняем его в файл
          docker save -o evolution.tar evolutionapi/evolution-api:latest
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: evolution-archive
          path: evolution.tar
