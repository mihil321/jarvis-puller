name: Docker Puller
on: [workflow_dispatch]
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Image
        run: |
          # Пробуем скачать официальный образ WAHA
          docker pull docker.io/devopsaurus/waha:latest
          # Сохраняем его
          docker save -o waha.tar docker.io/devopsaurus/waha:latest
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: waha-archive
          path: waha.tar
